apiVersion: apps/v1
kind: Deployment
metadata:
  name: drone-service
  namespace: shipping-on-the-air
spec:
  replicas: 1
  selector:
    matchLabels:
      app: drone-service
  template:
    metadata:
      labels:
        app: drone-service
    spec:
      containers:
        - name: drone-service
          image: shipping/drone-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: shipping-kafka
                  key: bootstrap.servers
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 8
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: drone-service
  namespace: shipping-on-the-air
spec:
  selector:
    app: drone-service
  ports:
    - port: 8003
      targetPort: 8003
