apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: shipping-on-the-air
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: shipping/order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: shipping-kafka
                  key: bootstrap.servers
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: shipping-on-the-air
spec:
  selector:
    app: order-service
  ports:
    - port: 8001
      targetPort: 8001
