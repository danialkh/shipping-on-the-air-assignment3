apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipment-orchestrator
  namespace: shipping-on-the-air
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shipment-orchestrator
  template:
    metadata:
      labels:
        app: shipment-orchestrator
    spec:
      containers:
        - name: shipment-orchestrator
          image: shipping/shipment-orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: shipping-kafka
                  key: bootstrap.servers
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 8
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: shipment-orchestrator
  namespace: shipping-on-the-air
spec:
  selector:
    app: shipment-orchestrator
  ports:
    - port: 8002
      targetPort: 8002
